id: "1"
title: "Linear Regression on House Prices"
topic: "Linear Algebra Basics"
description: >
  In this problem, you will implement a simple Linear Regression model
  from scratch using numpy to find the line of best fit for a housing
  dataset. Your goal is to predict house prices based on Square Footage.
difficulty: "Beginner"

objective_placeholder: "e.g. Find the line of best fit for the housing dataset..."
constraint_placeholder: "e.g. The Mean Squared Error (MSE) must be less than 500..."

datasets:
  - description: "Below is a preview of house_data.csv containing 500 records of local real estate."
    fields:
      - name: "Square_Footage (sq_ft)"
        type: "float"
        desc: "Size of the house in sq feet"
      - name: "Bedrooms"
        type: "int"
        desc: "Number of bedrooms"
      - name: "Price (USD)"
        type: "float"
        desc: "Target variable: sale price"

initial_code: |
  # AI4Numerics Editor
  # Use the Co-Pilot on the right to help write your script!

  import pandas as pd
  import numpy as np
  import matplotlib.pyplot as plt

  print('Hello World!')

unit_test_path: "/unit_tests/problem_1.py"
